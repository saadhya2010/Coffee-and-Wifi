{% extends 'base.html' %}
<!--Don't forget your import here-->
{% block title %}Add A New Cafe{% endblock %}

{% block content %}
<div class="container">
  <div class="row">
    <div class="col-sm-12 col-md-8">

      <h1 style="margin-top:20px">Add a new café into the database</h1>

      <!-- This is where your WTForm will go -->
        <form method="post">
          {% from 'bootstrap5/form.html' import render_form %}
          {{ render_form(form, novalidate=True) }}
        </form>

	  <p class="space-above"><a href="/cafes">See all cafes</a></p>

    </div>
  </div>
</div>

{% endblock %}
